name: Weekly Tests

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * SAT'
  push:
    branches:
      - master
    paths:
      - "tests/**"

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: pip install -r ./requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests
